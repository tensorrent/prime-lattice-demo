<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #05040a; overflow: hidden; }
    @keyframes dashflow { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
    @keyframes pulseGlow { from { opacity: 0.35; } to { opacity: 0.9; } }
    @keyframes debtFlash { from { box-shadow: 0 0 8px rgba(255,59,95,0.25); } to { box-shadow: 0 0 26px rgba(255,59,95,0.6); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
  </style>
  <script src="game.js"></script>
</helmet>
<div style="position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 0%, rgba(38,24,80,0.45) 0%, transparent 55%), radial-gradient(ellipse at 85% 100%, rgba(10,45,70,0.4) 0%, transparent 55%), radial-gradient(circle at 50% 50%, #0a0716 0%, #04030a 100%); font-family: 'Outfit', sans-serif; color: #efe9ff; overflow: hidden;" data-screen-label="Prime Lattice Board">

  <canvas ref="{{ bgCanvasRef }}" style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>

  <!-- Board -->
  <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;">
    <div style="position: relative; width: 840px; height: 580px; transform: scale({{ boardScale }}); flex: 0 0 auto;">
      <svg width="840" height="580" style="overflow: visible; display: block;">
        <defs>
          <linearGradient id="gradGold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" style="stop-color: #5c4310;"></stop>
            <stop offset="0.45" style="stop-color: #2e2308;"></stop>
            <stop offset="1" style="stop-color: #171204;"></stop>
          </linearGradient>
          <linearGradient id="gradCyan" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" style="stop-color: #0b4a63;"></stop>
            <stop offset="0.45" style="stop-color: #072a3d;"></stop>
            <stop offset="1" style="stop-color: #04141f;"></stop>
          </linearGradient>
          <linearGradient id="gradAnom" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" style="stop-color: #4d1668;"></stop>
            <stop offset="1" style="stop-color: #1c0728;"></stop>
          </linearGradient>
        </defs>

        <sc-for list="{{ cells }}" as="c" hint-placeholder-count="37">
          <g>
            <polygon points="{{ c.sidePts }}" fill="{{ c.sideFill }}" style="pointer-events: none;"></polygon>
            <polygon points="{{ c.pts }}" fill="{{ c.fill }}" stroke="{{ c.stroke }}" filter="{{ c.filter }}" onClick="{{ c.onClick }}" style="stroke-width: 1.6; cursor: pointer; transition: fill 0.2s ease, stroke 0.2s ease;" style-hover="filter: brightness(1.7);"></polygon>
          </g>
        </sc-for>

        <sc-for list="{{ lines }}" as="ln" hint-placeholder-count="0">
          <line x1="{{ ln.x1 }}" y1="{{ ln.y1 }}" x2="{{ ln.x2 }}" y2="{{ ln.y2 }}" stroke="{{ ln.color }}" filter="{{ ln.glow }}" style="stroke-width: 2.2; stroke-dasharray: 6 4; stroke-linecap: round; opacity: 0.7; pointer-events: none; animation: dashflow 1.1s linear infinite;"></line>
        </sc-for>

        <sc-for list="{{ pieces }}" as="p" hint-placeholder-count="10">
          <g transform="{{ p.transform }}" style="pointer-events: none; transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);">
            <polygon points="{{ p.pts }}" transform="translate(0,6)" fill="{{ p.sideFill }}"></polygon>
            <polygon points="{{ p.pts }}" fill="{{ p.fill }}" stroke="{{ p.stroke }}" filter="{{ p.glow }}" style="stroke-width: 2;"></polygon>
            <polygon points="{{ p.facetPts }}" fill="{{ p.facetFill }}" style="opacity: 0.5;"></polygon>
            <polygon points="{{ p.ringPts }}" fill="none" stroke="{{ p.ringColor }}" style="stroke-width: 1.4; stroke-dasharray: 5 3; opacity: 0.8;"></polygon>
            <polygon points="{{ p.anomPts }}" fill="none" stroke="#c94dff" filter="drop-shadow(0 0 6px rgba(201,77,255,0.8))" style="stroke-width: 1.6; animation: pulseGlow 0.9s infinite alternate;"></polygon>
          </g>
        </sc-for>
      </svg>
      <div style="position: absolute; inset: 0; pointer-events: none;">
        <sc-for list="{{ cells }}" as="c" hint-placeholder-count="37">
          <div>
            <div style="{{ c.coordStyle }}">{{ c.coordLabel }}</div>
            <div style="{{ c.previewStyle }}">{{ c.preview }}</div>
          </div>
        </sc-for>
        <sc-for list="{{ pieces }}" as="p" hint-placeholder-count="10">
          <div style="{{ p.textWrapStyle }}">
            <div style="{{ p.valueStyle }}">{{ p.value }}</div>
            <div style="font-size: 8.5px; font-weight: 700; letter-spacing: 1.2px; color: #d8d0ec; text-transform: uppercase; text-shadow: 0 1px 3px #05030a, 0 0 4px #05030a; line-height: 1;">{{ p.label }}</div>
          </div>
        </sc-for>
      </div>
      <canvas ref="{{ fxCanvasRef }}" width="840" height="580" style="position: absolute; inset: 0; pointer-events: none;"></canvas>
    </div>
  </div>

  <!-- Top HUD -->
  <div style="position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: flex-start; justify-content: space-between; padding: 18px 24px; pointer-events: none;">
    <div style="display: flex; flex-direction: column; gap: 4px; background: rgba(18,14,32,0.55); border: 1px solid {{ goldPanelBorder }}; border-radius: 14px; padding: 12px 18px; backdrop-filter: blur(14px); min-width: 150px;">
      <div style="font-size: 11px; letter-spacing: 3px; color: #f5c542; font-weight: 700;">GOLD</div>
      <div style="font-size: 26px; font-weight: 900; color: #f5c542; text-shadow: 0 0 14px rgba(245,197,66,0.45); font-family: 'JetBrains Mono', monospace;">{{ goldTotal }}</div>
      <div style="font-size: 10px; color: #8c82b0; letter-spacing: 1px;">ACTIVE MASS</div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="display: flex; align-items: center; gap: 12px; background: rgba(18,14,32,0.55); border: 1px solid rgba(255,255,255,0.08); border-radius: 100px; padding: 10px 26px; backdrop-filter: blur(14px);">
        <div style="width: 10px; height: 10px; border-radius: 50%; background: {{ turnDotColor }}; box-shadow: 0 0 10px {{ turnDotColor }};"></div>
        <div style="font-size: 15px; font-weight: 900; letter-spacing: 3px; color: {{ turnDotColor }};">{{ turnLabel }}</div>
        <div style="font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: {{ timerColor }}; min-width: 34px; text-align: right;">{{ timerText }}</div>
      </div>
      <div style="font-size: 10px; letter-spacing: 4px; color: #6c6390; font-weight: 700;">PRIME LATTICE</div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end; background: rgba(18,14,32,0.55); border: 1px solid {{ cyanPanelBorder }}; border-radius: 14px; padding: 12px 18px; backdrop-filter: blur(14px); min-width: 150px;">
      <div style="font-size: 11px; letter-spacing: 3px; color: #4fd8ff; font-weight: 700;">SILVER</div>
      <div style="font-size: 26px; font-weight: 900; color: #4fd8ff; text-shadow: 0 0 14px rgba(79,216,255,0.45); font-family: 'JetBrains Mono', monospace;">{{ silverTotal }}</div>
      <div style="font-size: 10px; color: #8c82b0; letter-spacing: 1px;">{{ silverModeLabel }}</div>
    </div>
  </div>

  <!-- Debt banner -->
  <sc-if value="{{ debtActive }}" hint-placeholder-val="{{ false }}">
    <div style="position: absolute; top: 108px; left: 50%; transform: translateX(-50%); background: rgba(60,8,20,0.75); border: 1px solid #ff3b5f; border-radius: 12px; padding: 10px 22px; font-size: 13px; font-weight: 700; letter-spacing: 1px; color: #ff9fb2; backdrop-filter: blur(10px); animation: debtFlash 1.4s infinite alternate;">{{ debtText }}</div>
  </sc-if>

  <!-- Bottom control bar -->
  <div style="position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(18,14,32,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 100px; padding: 8px 12px; backdrop-filter: blur(16px);">
    <button onClick="{{ onNewMatch }}" style="background: linear-gradient(135deg, rgba(79,216,255,0.18) 0%, rgba(26,17,56,0.6) 100%); border: 1px solid rgba(79,216,255,0.4); border-radius: 100px; color: #cdefff; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; padding: 10px 20px; cursor: pointer;" style-hover="border-color: #4fd8ff; box-shadow: 0 0 14px rgba(79,216,255,0.3);">NEW MATCH</button>
    <button onClick="{{ onToggleMode }}" style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; color: #efe9ff; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; padding: 10px 20px; cursor: pointer;" style-hover="background: rgba(255,255,255,0.09);">{{ modeLabel }}</button>
    <button onClick="{{ onCycleDifficulty }}" style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; color: #efe9ff; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; padding: 10px 20px; cursor: pointer;" style-hover="background: rgba(255,255,255,0.09);">{{ difficultyLabel }}</button>
    <button onClick="{{ onUndo }}" style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; color: #efe9ff; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; padding: 10px 20px; cursor: pointer;" style-hover="background: rgba(255,255,255,0.09);">UNDO</button>
    <button onClick="{{ onToggleLog }}" style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; color: #efe9ff; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; padding: 10px 20px; cursor: pointer;" style-hover="background: rgba(255,255,255,0.09);">{{ logBtnLabel }}</button>
  </div>

  <!-- Log terminal overlay -->
  <sc-if value="{{ logOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position: absolute; bottom: 80px; left: 20px; width: 360px; max-height: 300px; background: rgba(8,5,16,0.85); border: 1px solid rgba(201,77,255,0.25); border-radius: 14px; backdrop-filter: blur(14px); display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.25s ease;">
      <div style="padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 900; letter-spacing: 2.5px; color: #c94dff;">MATCH LOG</div>
      <div style="overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.45;">
        <sc-for list="{{ logEntries }}" as="e" hint-placeholder-count="3">
          <div style="border-left: 2px solid {{ e.color }}; padding-left: 8px; color: {{ e.textColor }};">{{ e.text }}</div>
        </sc-for>
      </div>
    </div>
  </sc-if>

  <!-- Win overlay -->
  <sc-if value="{{ gameOver }}" hint-placeholder-val="{{ false }}">
    <div style="position: absolute; inset: 0; background: rgba(5,4,10,0.8); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: center; z-index: 50;">
      <div style="background: rgba(20,15,35,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 26px; padding: 46px 64px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; max-width: 560px; animation: fadeIn 0.4s cubic-bezier(0.16,1,0.3,1); box-shadow: 0 30px 80px rgba(0,0,0,0.7);">
        <div style="font-size: 42px; font-weight: 900; letter-spacing: 3px; color: {{ winColor }}; text-shadow: 0 0 30px {{ winColor }};">{{ winTitle }}</div>
        <div style="font-size: 15px; line-height: 1.6; color: #c7bede;">{{ winMessage }}</div>
        <button onClick="{{ onRematch }}" style="margin-top: 8px; background: linear-gradient(135deg, rgba(245,197,66,0.2) 0%, rgba(26,17,56,0.6) 100%); border: 1px solid rgba(245,197,66,0.5); border-radius: 100px; color: #ffe9a3; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 900; letter-spacing: 2px; padding: 14px 40px; cursor: pointer;" style-hover="box-shadow: 0 0 20px rgba(245,197,66,0.35);">REMATCH</button>
      </div>
    </div>
  </sc-if>
</div>
</x-dc>
